name: Unity Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一ブランチで連続 push された場合は古い実行をキャンセルする
concurrency:
  group: unity-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run EditMode / PlayMode tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Library フォルダをキャッシュしてビルド時間を短縮する
      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-

      - name: Run tests
        uses: game-ci/unity-test-runner@v4
        env:
          # Personal ライセンス: .ulf の中身を Secret に登録しておく
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          unityVersion: 6000.0.30f1
          testMode: all
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          checkName: Unity Test Results

      # テスト結果 (XML) を成果物として保存する
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: artifacts
